<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Adidas</title>
        <style>
            #para{
                background-color: beige;
            }
        </style>
    </head>

    <body>
        <p id="para"></p>
        <script>
            var string1 = "adaa aada";
            var string2 = string1.split("").reverse().join("");
            if (string1 == string2) {
                document.getElementById('para').innerHTML = "Is Palindrome";
            } else {
                document.getElementById('para').innerHTML = "Is Not Palindrome";
            }
            var array = string1.split(" ");
            if (array.length > 1) {
                document.getElementById('para').innerHTML = array[0].substring(0, 3) + Math.random(0, 1000);
            }
            else {
                document.getElementById('para').innerHTML = "Less than 2 words.";
            }
        </script>
    </body>
</html>
