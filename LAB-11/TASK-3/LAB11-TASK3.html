<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hotel Room Pricing System</title>
        <link rel="stylesheet" type="text/css" href="Task3.css"/>
    </head>
    <body>
        <div class="container">
            <h1>Hotel Room Pricing System</h1>
            <h3>Select the month:</h3>
            <form>
                <input type="radio" name = "month" value="january">January
                <input type="radio" name = "month" value="february">February
                <input type="radio" name = "month" value="march">March
                <br/>
                <input type="radio" name = "month" value="april">April
                <input type="radio" name = "month" value="may">May
                <input type="radio" name = "month" value="june">June
                <br/>
                <input type="radio" name = "month" value="july">July
                <input type="radio" name = "month" value="august">August
                <input type="radio" name = "month" value="september">September
                <br/>
                <input type="radio" name = "month" value="october">October
                <input type="radio" name = "month" value="november">November
                <input type="radio" name = "month" value="december">December
                <br>
            </form>
            <h3>Select the room type:</h3>
            <form>
                <input type="radio" name = "room" value="standard">Standard
                <input type="radio" name = "room" value="deluxe">Deluxe
                <input type="radio" name = "room" value="suite">Suite
            </form>
                <input value="submit" type="button" id="submit-btn" onclick="findPrice()"/>
                <p id="output"></p>
        </div>
        <script type="text/javaScript" src="LAB11-TASK3.js"></script>
    </body>
</html>
