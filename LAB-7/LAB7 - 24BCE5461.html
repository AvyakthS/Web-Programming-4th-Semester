                <p style="text-align:center;font-weight: bolder;" >While A = true && B = false: </p>

                    var b = false;

                    document.write("The value of (a&&b) is ");
                    document.write(result = (a&&b));
                    document.write(linebreak);

                    document.write(result = (a||b));
